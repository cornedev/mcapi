name: build mcapi_gui

permissions:
  contents: write

on:
  push:
    branches: main
    paths:
      - .github/workflows/*
      - '**/**/CMakeLists.txt'
      - '**/**/*.cpp'
      - '**/**/*.hpp'
  pull_request:
    branches: main
    paths:
      - .github/workflows/*
      - '**/**/CMakeLists.txt'
      - '**/**/*.cpp'
      - '**/**/*.hpp'

concurrency:
  group: mcapi-gui-builds
  cancel-in-progress: true

jobs:
  build-linux:
    name: build mcapi_gui (linux)
    runs-on: ubuntu-latest

    steps:
      - name: checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            libarchive-dev \
            libcurl4-openssl-dev \
            nlohmann-json3-dev \
            qt6-base-dev qt6-base-dev-tools

      - name: configure cmake
        run: cmake -S gui -B gui/build

      - name: build project
        run: cmake --build gui/build

      - name: create package
        run: |
          tar -czf mcapi_gui-linux.tar.gz -C gui/build .

      - uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: mcapi_gui-linux.tar.gz

  build-macos:
    name: build mcapi_gui (macos)
    runs-on: macos-latest

    steps:
      - name: checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: install dependencies
        run: brew install libarchive nlohmann-json qt

      - name: configure cmake
        run: |
          cmake -S gui -B gui/build \
            -DLibArchive_ROOT="$(brew --prefix libarchive)"

      - name: build project
        run: cmake --build gui/build

      - name: create package
        run: |
          tar -czf mcapi_gui-macos.tar.gz -C gui/build .

      - uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: mcapi_gui-macos.tar.gz

  build-windows-mingw:
    name: build mcapi_gui (windows)
    runs-on: windows-latest

    steps:
      - name: checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          update: true
          install: >
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-libarchive
            mingw-w64-x86_64-nlohmann-json
            mingw-w64-x86_64-qt6

      - name: build project
        shell: msys2 {0}
        run: |
          cmake -S gui -B gui/build -G "MinGW Makefiles"
          cmake --build gui/build

      - name: create package
        shell: pwsh
        run: |
          Compress-Archive -Path gui/build/* -DestinationPath mcapi_gui-windows.zip

      - uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: mcapi_gui-windows.zip

  publish:
    name: publish builds
    needs: [build-linux, build-macos, build-windows-mingw]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
  
    steps:
      - uses: actions/checkout@v4
        with:
          ref: builds
  
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
  
      - name: copy builds
        run: |
          mkdir -p builds/gui/linux builds/gui/macos builds/gui/windows
  
          cp artifacts/linux-build/* builds/gui/linux/mcapi_gui.tar.gz
          cp artifacts/macos-build/* builds/gui/macos/mcapi_gui.tar.gz
          cp artifacts/windows-build/* builds/gui/windows/mcapi_gui.zip
  
      - name: push builds
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add builds
          git commit -m "Update all builds" || true
          git push origin builds