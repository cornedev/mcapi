name: build mcapi_cli

permissions:
  contents: write

on:
  push:
    branches: main
    paths:
      - .github/workflows/*
      - '**/**/CMakeLists.txt'
      - '**/**/*.cpp'
      - '**/**/*.hpp'
  pull_request:
    branches: main
    paths:
      - .github/workflows/*
      - '**/**/CMakeLists.txt'
      - '**/**/*.cpp'
      - '**/**/*.hpp'
  
concurrency:
  group: mcapi-cli-builds
  cancel-in-progress: true

jobs:
  build-linux:
    name: build mcapi_cli (linux)
    runs-on: ubuntu-latest

    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            libarchive-dev \
            libcurl4-openssl-dev \
            nlohmann-json3-dev

      - name: configure cmake
        run: cmake -S cli -B cli/build

      - name: build project
        run: cmake --build cli/build

      - name: create package
        run: |
          tar -czf mcapi_cli-linux.tar.gz -C cli/build .

      - uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: mcapi_cli-linux.tar.gz

  build-macos:
    name: build mcapi_cli (macos)
    runs-on: macos-latest

    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: install dependencies
        run: brew install libarchive nlohmann-json

      - name: configure cmake
        run: |
          cmake -S cli -B cli/build \
            -DLibArchive_ROOT="$(brew --prefix libarchive)"

      - name: build project
        run: cmake --build cli/build

      - name: create package
        run: |
          tar -czf mcapi_cli-macos.tar.gz -C cli/build .

      - uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: mcapi_cli-macos.tar.gz

  build-windows-mingw:
    name: build mcapi_cli (windows)
    runs-on: windows-latest

    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          update: true
          install: >
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-libarchive
            mingw-w64-x86_64-curl
            mingw-w64-x86_64-nlohmann-json
      - name: build project
        shell: msys2 {0}
        run: |
          cmake -S cli -B cli/build -G "MinGW Makefiles"
          cmake --build cli/build

      - name: create package
        shell: pwsh
        run: |
          Compress-Archive -Path cli/build/* -DestinationPath mcapi_cli-windows.zip

      - uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: mcapi_cli-windows.zip

  publish:
    name: publish builds
    needs: [build-linux, build-macos, build-windows-mingw]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
  
    steps:
      - uses: actions/checkout@v4
        with:
          ref: builds
  
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
  
      - name: copy builds
        run: |
          mkdir -p builds/cli/linux builds/cli/macos builds/cli/windows
  
          cp artifacts/linux-build/* builds/cli/linux/mcapi_cli.tar.gz
          cp artifacts/macos-build/* builds/cli/macos/mcapi_cli.tar.gz
          cp artifacts/windows-build/* builds/cli/windows/mcapi_cli.zip
  
      - name: push builds
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add builds
          git commit -m "Update all builds" || true
          git push origin builds
